name: CodeArena CI/CD

# Runs on every push/PR to main OR feat/db-layer. This is verification only —
# Vercel + Render auto-deploy directly from source, so failure here doesn't
# block the live deploys, but a green CI is a useful health signal.

on:
  push:
    branches: [main, feat/db-layer]
  pull_request:
    branches: [main, feat/db-layer]

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend (test · import-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Import-check (boots app + counts routes)
        working-directory: backend
        run: |
          rm -f codearena.db
          python -c "from app.main import app; assert len(app.routes) > 30; print(f'app loads, {len(app.routes)} routes')"

      - name: Test
        working-directory: backend
        run: python -m pytest -v
